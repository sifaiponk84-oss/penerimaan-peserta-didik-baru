<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pendaftaran Santri Non Yatim</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f7fb;
padding:40px 20px;
color:#222;
}

.container{
max-width:1100px;
margin:auto;
}

.form-box{
background:#fff;
padding:35px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
margin-bottom:50px;
}

.title{
text-align:center;
margin-bottom:35px;
}

.title h1{
font-size:38px;
color:#1c2b4a;
margin-bottom:10px;
}

.title p{
color:#666;
}

form{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

input,
select,
textarea{
width:100%;
padding:15px;
border:none;
background:#f1f5f9;
border-radius:12px;
outline:none;
font-size:15px;
}

textarea{
resize:none;
height:130px;
}

.full{
grid-column:1/-1;
}

button{
background:#1c2b4a;
color:#fff;
border:none;
padding:15px;
border-radius:40px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#273c75;
}

.back-btn{
display:inline-block;
margin-top:20px;
text-decoration:none;
background:#f7c948;
color:#111;
padding:12px 25px;
border-radius:40px;
font-weight:600;
}

.table-box{
background:#fff;
border-radius:20px;
padding:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:700px;
}

th{
background:#1c2b4a;
color:#fff;
padding:14px;
font-size:14px;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
font-size:14px;
}

.status{
color:green;
font-weight:600;
}

.delete-btn{
background:red;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

@media(max-width:768px){

.title h1{
font-size:28px;
}

form{
grid-template-columns:1fr;
}

table{
min-width:100%;
}

th{
font-size:10px;
padding:8px 4px;
}

td{
font-size:10px;
padding:8px 4px;
}

.delete-btn{
font-size:10px;
padding:5px 6px;
}

}

</style>
</head>

<body>

<div class="container">

<!-- FORM -->

<div class="form-box">

<div class="title">

<h1>Pendaftaran Santri Non Yatim</h1>

<p>
Silakan isi formulir berikut untuk melakukan pendaftaran.
</p>

</div>

<form id="formNonYatim">

<input type="text"
id="nama"
placeholder="Nama Lengkap"
required>

<input type="text"
id="ttl"
placeholder="Tempat, Tanggal Lahir"
required>

<input type="number"
id="wa"
placeholder="Nomor WhatsApp"
required>

<input type="email"
id="email"
placeholder="Email Aktif"
required>

<select id="jenjang" required>

<option value="">Pilih Jenjang</option>
<option>SMPIT</option>
<option>SMAIT</option>

</select>

<select id="jk" required>

<option value="">Jenis Kelamin</option>
<option>Laki-laki</option>
<option>Perempuan</option>

</select>

<textarea
id="alamat"
class="full"
placeholder="Alamat Lengkap"></textarea>

<div class="full">

<button type="submit">

Kirim Pendaftaran

</button>

</div>

</form>

<a href="index.html" class="back-btn">
← Kembali
</a>

</div>

<!-- HISTORY -->

<div class="title">

<h1>History Pendaftaran Non Yatim</h1>

<p>
Data santri non yatim yang telah melakukan pendaftaran.
</p>

</div>

<div class="table-box">

<table>

<thead>

<tr>

<th>No</th>
<th>Nama</th>
<th>Jenjang</th>
<th>Tanggal</th>
<th>Status</th>
<th>Aksi</th>

</tr>

</thead>

<tbody id="historyNonYatim">

</tbody>

</table>

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
push,
onValue,
remove
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyAuFh5REzzifTOqORlWyveDqiRKS0b2fI8",

authDomain: "pendaftaran-356dc.firebaseapp.com",

databaseURL: "https://pendaftaran-356dc-default-rtdb.firebaseio.com",

projectId: "pendaftaran-356dc",

storageBucket: "pendaftaran-356dc.firebasestorage.app",

messagingSenderId: "996990661720",

appId: "1:996990661720:web:c81b421017591c99d0462d",

measurementId: "G-5YNM7FVZHV"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const ADMIN_PASSWORD = "seribubulan";

const form =
document.getElementById('formNonYatim');

form.addEventListener('submit', function(e){

e.preventDefault();

const data = {

nama:
document.getElementById('nama').value,

ttl:
document.getElementById('ttl').value,

wa:
document.getElementById('wa').value,

email:
document.getElementById('email').value,

jenjang:
document.getElementById('jenjang').value,

jk:
document.getElementById('jk').value,

alamat:
document.getElementById('alamat').value,

kategori:'Non Yatim',

status:'Baru Daftar',

tanggal:
new Date().toLocaleDateString('id-ID',{

day:'2-digit',
month:'long',
year:'numeric'

})

};

push(ref(db,'pendaftaran-nonyatim'),data);

alert("Pendaftaran berhasil dikirim!");

form.reset();

});

const historyNonYatim =
document.getElementById('historyNonYatim');

onValue(ref(db,'pendaftaran-nonyatim'),(snapshot)=>{

historyNonYatim.innerHTML='';

let no = 1;

snapshot.forEach((childSnapshot)=>{

const data = childSnapshot.val();

const key = childSnapshot.key;

historyNonYatim.innerHTML += `

<tr>

<td>${no++}</td>

<td>${data.nama}</td>

<td>${data.jenjang}</td>

<td>${data.tanggal}</td>

<td class="status">
${data.status}
</td>

<td>

<button
class="delete-btn"
onclick="hapusData('${key}')">

Hapus

</button>

</td>

</tr>

`;

});

});

window.hapusData = function(key){

const password =
prompt("Masukkan Password Admin");

if(password === ADMIN_PASSWORD){

remove(ref(db,'pendaftaran-nonyatim/' + key));

alert("Data berhasil dihapus");

}else{

alert("Password salah!");

}

}

</script>

</body>
</html>
